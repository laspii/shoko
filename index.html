<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Крафтові Солодощі</title>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        #loader { display: flex; justify-content: center; align-items: center; height: 100vh; font-weight: bold; }

        /* --- НОВА ЖУРНАЛЬНА СІТКА --- */
        #product-grid { 
            display: none; 
            flex-direction: column; 
            gap: 4px; 
            width: 100vw; 
            background-color: var(--bg-color);
            padding-bottom: 20px;
        }

        .product-card {
            display: grid;
            width: 100vw;
            gap: 4px;
            /* Золотий перетин. Використовуємо 38fr і 62fr для стабільності */
            grid-template-columns: 38fr 62fr; 
            cursor: pointer;
        }

        /* Шахматка для парних рядів */
        .product-card:nth-child(even) {
            grid-template-columns: 62fr 38fr;
        }

        .thumbnails-col {
            display: grid;
            grid-template-rows: repeat(3, 1fr); 
            gap: 4px;
            min-width: 0; /* ЗАХИСТ ВІД РОЗРИВУ СІТКИ */
        }

        .main-col {
            position: relative;
            aspect-ratio: 1 / 1.15; 
            overflow: hidden;
            min-width: 0; /* ЗАХИСТ ВІД РОЗРИВУ СІТКИ */
        }

        .product-card:nth-child(odd) .thumbnails-col { grid-column: 1; }
        .product-card:nth-child(odd) .main-col { grid-column: 2; }
        .product-card:nth-child(even) .main-col { grid-column: 1; }
        .product-card:nth-child(even) .thumbnails-col { grid-column: 2; }

        .main-col img, .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumb-item {
            background-color: rgba(0, 0, 0, 0.05); 
            overflow: hidden;
            min-height: 0;
        }

        .product-info-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
            color: #ffffff;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            pointer-events: none;
        }

        .product-info-overlay .title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.2;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .product-info-overlay .price {
            font-size: 16px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .cart-badge {
            position: absolute; top: 10px; right: 10px; background-color: var(--button-color); color: var(--button-text-color);
            border-radius: 50%; width: 26px; height: 26px; display: none; justify-content: center; align-items: center; font-size: 14px; font-weight: bold;
            z-index: 5;
        }

        /* --- КАРТКА ТОВАРУ --- */
        #product-view { display: none; padding-bottom: 80px; }
        .carousel-container { position: relative; width: 100vw; aspect-ratio: 1/1; overflow: hidden; background: #000; }
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; height: 100%; scroll-behavior: smooth; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel img { width: 100vw; height: 100%; object-fit: cover; flex-shrink: 0; scroll-snap-align: center; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; z-index: 10; display: flex; justify-content: center; align-items: center; }
        .nav-btn.left { left: 10px; }
        .nav-btn.right { right: 10px; }
        .details-container { padding: 20px; }
        .details-title { font-size: 24px; font-weight: bold; margin-bottom: 8px; }
        .details-price { font-size: 22px; color: #ffcc00; font-weight: bold; margin-bottom: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .details-desc { font-size: 15px; line-height: 1.6; color: var(--text-color); white-space: pre-wrap; margin-bottom: 20px; }
        .add-to-cart-btn { display: block; width: 100%; background-color: var(--button-color); color: var(--button-text-color); text-align: center; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; }

        /* --- ФОРМА ЗАМОВЛЕННЯ --- */
        #order-form { display: none; padding: 20px; box-sizing: border-box; width: 100%; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: var(--bg-color); color: var(--text-color); }
        .cart-summary { margin-top: 20px; padding: 15px; background-color: rgba(0,0,0,0.05); border-radius: 8px; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="loader">Завантаження смаколиків...</div>

    <div id="product-grid"></div>

    <div id="product-view">
        <div class="carousel-container">
            <button class="nav-btn left" id="btn-prev" onclick="changeSlide(-1)">❮</button>
            <div class="carousel" id="carousel"></div>
            <button class="nav-btn right" id="btn-next" onclick="changeSlide(1)">❯</button>
        </div>
        <div class="details-container">
            <div class="details-title" id="detail-title"></div>
            <div class="details-price" id="detail-price"></div>
            <div class="details-desc" id="detail-desc"></div>
            <button class="add-to-cart-btn" onclick="addToCartFromDetail()">Додати в кошик 🛒</button>
        </div>
    </div>

    <div id="order-form">
        <h2>Оформлення замовлення</h2>
        <div class="cart-summary" id="cart-summary-text"></div>
        <div class="form-group" style="margin-top: 15px;">
            <label for="name">Ваше Ім'я (ПІБ):</label>
            <input type="text" id="name" placeholder="Іванов Іван">
        </div>
        <div class="form-group">
            <label for="phone">Номер телефону:</label>
            <input type="tel" id="phone" placeholder="+380...">
        </div>
        <div class="form-group">
            <label for="city">Місто (Нова Пошта):</label>
            <input type="text" id="city" placeholder="Київ">
        </div>
        <div class="form-group">
            <label for="warehouse">Номер відділення / поштомату:</label>
            <input type="text" id="warehouse" placeholder="Відділення №15">
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ==========================================
        // ВСТАВ СВІЙ URL НИЖЧЕ!
        const GOOGLE_SCRIPT_URL = "ТУТ_МАЄ_БУТИ_ТВІЙ_URL_ЯКИЙ_ЗАКІНЧУЄТЬСЯ_НА_/exec";
        // ==========================================
        
        let products = [];
        let cart = {}; 
        let currentView = 'grid'; 
        let currentProductId = null;

        const loader = document.getElementById('loader');
        const grid = document.getElementById('product-grid');
        const productView = document.getElementById('product-view');
        const orderForm = document.getElementById('order-form');

        async function fetchProducts() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                products = await response.json();
                renderProducts();
            } catch (error) {
                loader.innerHTML = "Помилка завантаження.";
            }
        }

        function renderProducts() {
            grid.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openProduct(p.ID); 
                
                const images = p['Фото_URL'].split(',').map(url => url.trim());
                const mainImg = images[0] || 'https://via.placeholder.com/600';
                
                const thumb1 = images[1] ? `<img src="${images[1]}">` : '';
                const thumb2 = images[2] ? `<img src="${images[2]}">` : '';
                const thumb3 = images[3] ? `<img src="${images[3]}">` : '';

                const count = cart[p.ID] || 0;
                const badgeDisplay = count > 0 ? 'flex' : 'none';

                card.innerHTML = `
                    <div class="thumbnails-col">
                        <div class="thumb-item">${thumb1}</div>
                        <div class="thumb-item">${thumb2}</div>
                        <div class="thumb-item">${thumb3}</div>
                    </div>
                    <div class="main-col">
                        <img src="${mainImg}" alt="${p['Назва']}">
                        <div class="cart-badge" id="badge-${p.ID}" style="display: ${badgeDisplay}">${count}</div>
                        <div class="product-info-overlay">
                            <div class="title">${p['Назва']}</div>
                            <div class="price">${p['Ціна']} ₴</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            loader.style.display = 'none';
            grid.style.display = 'flex'; 
        }

        function openProduct(id) {
            const p = products.find(prod => prod.ID == id);
            if(!p) return;

            currentView = 'product';
            currentProductId = id;

            grid.style.display = 'none';
            productView.style.display = 'block';

            document.getElementById('detail-title').innerText = p['Назва'];
            document.getElementById('detail-price').innerText = p['Ціна'] + ' ₴';
            
            // Виправляємо подвійні пробіли з Instagram
            const desc = p['Опис'] || 'Опис скоро з\'явиться...';
            document.getElementById('detail-desc').innerText = desc.replace(/\n\s*\n/g, '\n');

            const images = p['Фото_URL'].split(',').map(url => url.trim());
            const carousel = document.getElementById('carousel');
            carousel.innerHTML = images.map(img => `<img src="${img}" alt="Фото">`).join('');

            document.getElementById('btn-prev').style.display = images.length > 1 ? 'flex' : 'none';
            document.getElementById('btn-next').style.display = images.length > 1 ? 'flex' : 'none';

            tg.MainButton.hide();
            tg.BackButton.show();
            tg.BackButton.onClick(goBackToGrid);
        }

        function changeSlide(direction) {
            const carousel = document.getElementById('carousel');
            const width = carousel.clientWidth;
            carousel.scrollBy({ left: direction * width, behavior: 'smooth' });
        }

        function addToCartFromDetail() {
            if (!cart[currentProductId]) cart[currentProductId] = 0;
            cart[currentProductId]++;
            
            const badge = document.getElementById(`badge-${currentProductId}`);
            if(badge) {
                badge.textContent = cart[currentProductId];
                badge.style.display = 'flex';
            }
            
            tg.HapticFeedback.success(); 
            goBackToGrid(); 
        }

        function goBackToGrid() {
            currentView = 'grid';
            productView.style.display = 'none';
            orderForm.style.display = 'none';
            grid.style.display = 'flex';
            
            tg.BackButton.offClick(goBackToGrid);
            tg.BackButton.hide();
            updateMainButton();
        }

        function updateMainButton() {
            if (currentView === 'grid') {
                const totalItems = Object.values(cart).reduce((a, b) => a + b, 0);
                if (totalItems > 0) {
                    tg.MainButton.setText(`ОФОРМИТИ ЗАМОВЛЕННЯ (${totalItems} шт)`);
                    tg.MainButton.show();
                    tg.MainButton.onClick(showOrderForm);
                } else {
                    tg.MainButton.hide();
                }
            } else if (currentView === 'form') {
                tg.MainButton.setText("ПІДТВЕРДИТИ ТА ВІДПРАВИТИ");
                tg.MainButton.offClick(showOrderForm);
                tg.MainButton.onClick(submitOrder);
            }
        }

        function showOrderForm() {
            currentView = 'form';
            grid.style.display = 'none';
            orderForm.style.display = 'block';
            
            let summaryText = '<b>Ваше замовлення:</b><br>';
            let totalSum = 0;
            
            for (const [id, count] of Object.entries(cart)) {
                const product = products.find(p => p.ID == id);
                if(product) {
                    const sum = product['Ціна'] * count;
                    totalSum += sum;
                    summaryText += `• ${product['Назва']} - ${count} шт (${sum} ₴)<br>`;
                }
            }
            summaryText += `<br><b>Разом: ${totalSum} ₴</b>`;
            document.getElementById('cart-summary-text').innerHTML = summaryText;
            
            tg.BackButton.show();
            tg.BackButton.onClick(goBackToGrid);
            updateMainButton();
        }

        async function submitOrder() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const city = document.getElementById('city').value;
            const warehouse = document.getElementById('warehouse').value;

            if(!name || !phone || !city || !warehouse) {
                tg.showAlert("Будь ласка, заповніть всі поля!");
                return;
            }

            tg.MainButton.showProgress();

            let itemsSummary = [];
            let totalPrice = 0;
            for (const [id, count] of Object.entries(cart)) {
                const product = products.find(p => p.ID == id);
                if(product) {
                    itemsSummary.push(`${product['Назва']} x${count}`);
                    totalPrice += product['Ціна'] * count;
                }
            }

            const data = {
                clientName: name, clientPhone: phone, city: city, warehouse: warehouse,
                itemsSummary: itemsSummary.join(", "), totalPrice: totalPrice
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                const result = await response.json();
                
                if(result.success) {
                    tg.showAlert(`Дякуємо! Замовлення ${result.orderId} прийнято.`, () => tg.close());
                } else {
                    tg.showAlert("Помилка при відправці.");
                }
            } catch (error) {
                tg.showAlert("Помилка зв'язку з сервером.");
            } finally {
                tg.MainButton.hideProgress();
            }
        }

        fetchProducts();
    </script>
</body>
</html>
