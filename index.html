<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Підключення бібліотеки Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Крафтові Солодощі</title>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Екран завантаження */
        #loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 18px;
            font-weight: bold;
        }

        /* Сітка товарів без пробілів */
        #product-grid {
            display: none; /* Сховано доки не завантажаться товари */
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            width: 100vw;
        }

        .product-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
        }

        .product-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .product-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
            color: #ffffff;
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            pointer-events: none; /* Щоб клік йшов на саму картку */
        }

        .product-title {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .product-price {
            font-size: 13px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Вибір кількості (кружечок) */
        .cart-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: var(--button-color);
            color: var(--button-text-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            display: none; /* Сховано за замовчуванням */
        }

        /* Форма замовлення */
        #order-form {
            display: none;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; /* Запобігає зуму на iPhone */
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .cart-summary {
            margin-top: 20px;
            padding: 15px;
            background-color: rgba(0,0,0,0.05);
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="loader">Завантаження смаколиків...</div>

    <div id="product-grid">
        <!-- Товари будуть додані сюди через JavaScript -->
    </div>

    <div id="order-form">
        <h2>Оформлення замовлення</h2>
        <div class="cart-summary" id="cart-summary-text"></div>
        
        <div class="form-group" style="margin-top: 15px;">
            <label for="name">Ваше Ім'я (ПІБ):</label>
            <input type="text" id="name" placeholder="Іванов Іван">
        </div>
        <div class="form-group">
            <label for="phone">Номер телефону:</label>
            <input type="tel" id="phone" placeholder="+380...">
        </div>
        <div class="form-group">
            <label for="city">Місто (Нова Пошта):</label>
            <input type="text" id="city" placeholder="Київ">
        </div>
        <div class="form-group">
            <label for="warehouse">Номер відділення / поштомату:</label>
            <input type="text" id="warehouse" placeholder="Відділення №15">
        </div>
    </div>

    <script>
        // Ініціалізація Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгорнути на весь екран
        
        // ==========================================
        // УВАГА: ВСТАВ СВІЙ URL З GOOGLE SCRIPT НИЖЧЕ!
        // ==========================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlEhnsBStQG9YhNWZc8fyf7jBZU5TIYiXf7fkmdtJ5-DSrwpdwNszV96tg_jIAPG_9Yw/exec";
        
        let products = [];
        let cart = {}; // Об'єкт для зберігання кошика { id: кількість }
        let currentView = 'grid'; // 'grid' або 'form'

        // Елементи DOM
        const loader = document.getElementById('loader');
        const grid = document.getElementById('product-grid');
        const orderForm = document.getElementById('order-form');

        // Завантаження товарів
        async function fetchProducts() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                products = await response.json();
                renderProducts();
            } catch (error) {
                loader.innerHTML = "Помилка завантаження. Спробуйте пізніше.";
                console.error(error);
            }
        }

        // Відмальовка товарів
        function renderProducts() {
            grid.innerHTML = '';
            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'product-item';
                // При кліку додаємо в кошик
                item.onclick = () => toggleCart(p.ID); 
                
                // Перевірка кількості в кошику
                const count = cart[p.ID] || 0;
                const badgeDisplay = count > 0 ? 'flex' : 'none';

                item.innerHTML = `
                    <img src="${p['Фото_URL']}" alt="${p['Назва']}">
                    <div class="cart-badge" id="badge-${p.ID}" style="display: ${badgeDisplay}">${count}</div>
                    <div class="product-info">
                        <div class="product-title">${p['Назва']}</div>
                        <div class="product-price">${p['Ціна']} ₴</div>
                    </div>
                `;
                grid.appendChild(item);
            });
            
            loader.style.display = 'none';
            grid.style.display = 'grid';
        }

        // Логіка кошика (простий клік - додати 1, довгий або повторний - можна ускладнити, поки просто додаємо по 1)
        // Для простоти MVP: клік додає +1. Щоб скинути, треба буде оновити сторінку. 
        // Або зробимо так: клік додає +1, якщо більше 5 - скидає на 0.
        function toggleCart(id) {
            if (!cart[id]) cart[id] = 0;
            cart[id]++;
            
            if(cart[id] > 10) cart[id] = 0; // Захист від випадкових кліків
            
            const badge = document.getElementById(`badge-${id}`);
            if(cart[id] > 0) {
                badge.textContent = cart[id];
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
                delete cart[id];
            }
            
            updateMainButton();
        }

        // Оновлення головної кнопки Telegram
        function updateMainButton() {
            if (currentView === 'grid') {
                const totalItems = Object.values(cart).reduce((a, b) => a + b, 0);
                if (totalItems > 0) {
                    tg.MainButton.setText(`ОФОРМИТИ ЗАМОВЛЕННЯ (${totalItems} шт)`);
                    tg.MainButton.show();
                    tg.MainButton.onClick(showOrderForm);
                } else {
                    tg.MainButton.hide();
                }
            } else if (currentView === 'form') {
                tg.MainButton.setText("ПІДТВЕРДИТИ ТА ВІДПРАВИТИ");
                tg.MainButton.offClick(showOrderForm);
                tg.MainButton.onClick(submitOrder);
            }
        }

        // Перехід до форми
        function showOrderForm() {
            currentView = 'form';
            grid.style.display = 'none';
            orderForm.style.display = 'block';
            
            // Формуємо текст чеку
            let summaryText = '<b>Ваше замовлення:</b><br>';
            let totalSum = 0;
            
            for (const [id, count] of Object.entries(cart)) {
                const product = products.find(p => p.ID == id);
                if(product) {
                    const sum = product['Ціна'] * count;
                    totalSum += sum;
                    summaryText += `• ${product['Назва']} - ${count} шт (${sum} ₴)<br>`;
                }
            }
            summaryText += `<br><b>Разом: ${totalSum} ₴</b>`;
            document.getElementById('cart-summary-text').innerHTML = summaryText;
            
            // Кнопка "Назад" в Telegram
            tg.BackButton.show();
            tg.BackButton.onClick(() => {
                currentView = 'grid';
                orderForm.style.display = 'none';
                grid.style.display = 'grid';
                tg.BackButton.hide();
                updateMainButton();
            });

            updateMainButton();
        }

        // Відправка замовлення
        async function submitOrder() {
            // Перевірка полів
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const city = document.getElementById('city').value;
            const warehouse = document.getElementById('warehouse').value;

            if(!name || !phone || !city || !warehouse) {
                tg.showAlert("Будь ласка, заповніть всі поля!");
                return;
            }

            tg.MainButton.showProgress();

            // Збираємо дані
            let itemsSummary = [];
            let totalPrice = 0;
            for (const [id, count] of Object.entries(cart)) {
                const product = products.find(p => p.ID == id);
                if(product) {
                    itemsSummary.push(`${product['Назва']} x${count}`);
                    totalPrice += product['Ціна'] * count;
                }
            }

            const data = {
                clientName: name,
                clientPhone: phone,
                city: city,
                warehouse: warehouse,
                itemsSummary: itemsSummary.join(", "),
                totalPrice: totalPrice
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if(result.success) {
                    tg.showAlert(`Дякуємо! Замовлення ${result.orderId} прийнято в обробку.`, () => {
                        tg.close(); // Закриваємо вікно після успіху
                    });
                } else {
                    tg.showAlert("Сталася помилка при відправці. Спробуйте ще раз.");
                }
            } catch (error) {
                tg.showAlert("Помилка зв'язку з сервером.");
            } finally {
                tg.MainButton.hideProgress();
            }
        }

        // Запускаємо завантаження при старті
        fetchProducts();
    </script>
</body>
</html>
